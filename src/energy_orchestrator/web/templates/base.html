<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Energy Orchestrator{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}">
    <!-- PWA: makes the dashboard installable on Android/iOS as a standalone app -->
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="theme-color" content="#0e1116">
    <link rel="icon" type="image/svg+xml" href="/static/icon.svg">
    <link rel="apple-touch-icon" href="/static/icon.svg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="EnergyCenter">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <header>
        <h1>Energy Orchestrator</h1>
        <nav>
            <a href="/">Dashboard</a>
            <a href="/debug">Debug</a>
            <a href="/config">Config</a>
            <a href="/logs">Logs</a>
            <a href="/docs">API</a>
            <a href="#" id="nav-exit" onclick="return exitApp();">Exit</a>
        </nav>
    </header>
    <script>
        function exitApp() {
            if (!confirm("Close the kiosk and return to the desktop? (The orchestrator keeps running in the background.)")) return false;
            fetch("/api/shutdown", { method: "POST" }).catch(function () {});
            document.body.innerHTML =
                "<div style='padding:2rem;color:#94a3b8;font-family:sans-serif;'>Closing kiosk…</div>";
            return false;
        }
    </script>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        <small>Belgian dynamic-tariff orchestrator &mdash; sonnenBatterie + HomeWizard + SolarEdge</small>
    </footer>
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", function () {
                navigator.serviceWorker.register("/sw.js").catch(function () {});
            });
        }
    </script>
</body>
</html>
