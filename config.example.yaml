# Energy Orchestrator — example configuration.
# Copy to config.yaml and edit. config.yaml is gitignored.

poll_interval_s: 5           # device-poll cadence (Reading row written each tick)
decision_interval_s: 60      # decision/actuation cadence — typically >= poll_interval_s

sonnen:
  host: 192.168.1.50
  port: 80
  api_version: v2
  auth_token: REPLACE_WITH_LOCAL_TOKEN
  capacity_kwh: 10.0

homewizard:
  car_charger:
    host: 192.168.1.51
    charging_threshold_w: 500
  p1_meter:
    host: 192.168.1.52
  small_solar:
    host: 192.168.1.53
    peak_w: 2000
  # large_solar:                # optional second HomeWizard kWh meter; omit to disable
  #   host: 192.168.1.54
  #   peak_w: 6000

solaredge:
  host: 192.168.1.60
  modbus_port: 1502
  unit_id: 1

# etrel:                       # optional Etrel INCH EV charger (Modbus TCP); omit to disable
#   host: 192.168.1.250
#   modbus_port: 502
#   unit_id: 1

prices:
  provider: entsoe       # entsoe | tibber | csv
  api_key: REPLACE_ME    # required for entsoe / tibber
  area: BE
  injection_factor: 1.0
  injection_offset: 0.0
  # csv_path: data/prices.csv  # only when provider: csv
  # base_url: https://...      # override entsoe REST endpoint if it changes

solar:                   # Forecast.Solar — omit the whole section to disable
  latitude: 51.0543      # Gent, BE
  longitude: 3.7174
  # api_key: REPLACE_ME  # only needed for paid Forecast.Solar tiers
  planes:                # one entry per array (max 4)
    - name: east
      declination: 45    # tilt 0=flat, 90=vertical
      azimuth: -90       # -90=east, 0=south, 90=west, 180=north
      kwp: 6.0
    - name: west
      declination: 45
      azimuth: 90
      kwp: 6.5

decision:
  battery_low_soc_pct: 60
  battery_full_soc_pct: 80
  hysteresis_pct: 5
  forecast_horizon_h: 12
  dry_run: true          # actuator writes are suppressed while true

# charger_control:                # rule-based Etrel EV-charger control, solar daytime only
#   enabled: false                # master switch (needs the etrel + solar sections to actually run)
#   dry_run: true                 # compute + log decisions, but don't write to the charger
#   battery_floor_soc_pct: 30     # charge-stop gate: below this the home battery has priority
#   battery_floor_hysteresis_pct: 3
#   export_threshold_w: 500       # up-tick the current when the available-power signal exceeds this
#   import_threshold_w: 500       # down-tick on real grid import OR battery over-discharge past its cap
#   battery_max_output_w: 9000    # battery discharge the car may lean on (tapered down by SoC)
#   taper_floor_soc_pct: 30       # SoC where the battery's signal contribution tapers to 0; separate
#                                 # from the charge-stop floor (lower = lean harder on the battery)
#   resume_surplus_threshold_w: 4300   # resume from pause only when the signal covers the min draw
#   min_charge_a: 6               # below this the charger pauses
#   max_charge_a: 16              # installation hard cap (<= 16 A)
#   step_a: 1                     # +/- adjustment per decision tick
#   # Start-failure backoff: repeatedly offering/withdrawing the AC pilot can latch
#   # an EV's onboard charger into a protective fault, so a car that won't draw is
#   # backed off rather than cycled.
#   start_timeout_s: 120          # grace for the car to start drawing after a resume
#   failed_start_cooldown_s: 300  # pause this long after a failed start before retrying
#   max_consecutive_failed_starts: 3   # after this many, use the longer backoff below
#   backoff_cooldown_s: 1800      # long rest once repeated starts keep failing
#   resume_cooldown_s: 90         # min pause after a down-tick-to-pause (anti-flap)

storage:
  sqlite_path: data/orchestrator.db
  history_retention_days: 90

logging:
  log_dir: logs
  level: INFO
  retention_days: 30

web:
  host: 0.0.0.0
  port: 8000
