<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Energy Orchestrator{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <header>
        <h1>Energy Orchestrator</h1>
        <nav>
            <a href="/">Dashboard</a>
            <a href="/debug">Debug</a>
            <a href="/config">Config</a>
            <a href="/logs">Logs</a>
            <a href="/docs">API</a>
            <a href="#" id="nav-exit" onclick="return exitApp();">Exit</a>
        </nav>
    </header>
    <script>
        function exitApp() {
            if (!confirm("Shut down the orchestrator and close the kiosk?")) return false;
            fetch("/api/shutdown", { method: "POST" }).catch(function () {});
            document.body.innerHTML =
                "<div style='padding:2rem;color:#94a3b8;font-family:sans-serif;'>Shutting down…</div>";
            return false;
        }
    </script>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        <small>Belgian dynamic-tariff orchestrator &mdash; sonnenBatterie + HomeWizard + SolarEdge</small>
    </footer>
</body>
</html>
